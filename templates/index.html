<!DOCTYPE html>
<html>
<head>
<title>Task Manager</title>
</head>

<body>

<h2>Add Task</h2>



<form action="/add" method="POST">

Title:
<input type="text" name="title" required><br><br>

Description:
<input type="text" name="description"><br><br>

Due Date:
<input type="date" name="duedate"><br><br>

Status:
<select name="status">
<option>Pending</option>
<option>Completed</option>
</select><br><br>

<button type="submit">Add Task</button>

</form>

<hr>
<h2>Search Task</h2>

<form action="/search" method="POST">
<input type="text" name="search" placeholder="Enter task title">
<button type="submit">Search</button>
</form>

<hr>

<h2>Task List</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Due Date</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for task in tasks %}

<tr>
<td>{{task[0]}}</td>
<td>{{task[1]}}</td>
<td>{{task[2]}}</td>
<td>{{task[3]}}</td>
<td>{{task[4]}}</td>

<td>
<a href="/edit/{{task[0]}}">Edit</a> |
<a href="/delete/{{task[0]}}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
